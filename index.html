<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CrediOpciones - Demo WhatsApp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #111b21;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }
  .phone-frame {
    width: 390px; max-width: 100%;
    border-radius: 40px; border: 8px solid #1a1a2e;
    overflow: hidden; background: #efeae2;
    display: flex; flex-direction: column;
    height: 780px;
  }
  .wa-header {
    background: #1f2c34; padding: 12px 16px 10px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .wa-back { color: #aebac1; font-size: 22px; cursor: pointer; user-select: none; }
  .wa-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: #25d366; display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .wa-contact-info { flex: 1; }
  .wa-contact-name { color: #e9edef; font-size: 15px; font-weight: 500; }
  .wa-contact-status { color: #8696a0; font-size: 12px; }
  .wa-header-icons { display: flex; gap: 18px; }
  .wa-icon { color: #aebac1; font-size: 20px; cursor: pointer; }
  .wa-messages {
    flex: 1; overflow-y: auto; padding: 12px 8px;
    display: flex; flex-direction: column; gap: 4px;
    background: #efeae2; scroll-behavior: smooth;
  }
  .wa-messages::-webkit-scrollbar { width: 4px; }
  .wa-messages::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 2px; }
  .date-divider { text-align: center; margin: 8px 0; }
  .date-divider span {
    background: #d9dde1; color: #54656f;
    font-size: 11.5px; padding: 4px 10px; border-radius: 8px;
  }
  .bubble-wrap {
    display: flex; flex-direction: column;
    max-width: 80%; gap: 2px;
  }
  .bubble-wrap.user { align-self: flex-end; align-items: flex-end; }
  .bubble-wrap.agent { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 7px 10px; border-radius: 8px;
    font-size: 14px; line-height: 1.45; word-break: break-word;
  }
  .bubble.user { background: #d9fdd3; color: #111b21; border-top-right-radius: 2px; }
  .bubble.agent { background: #ffffff; color: #111b21; border-top-left-radius: 2px; }
  .bubble-time { font-size: 11px; color: #8696a0; padding: 0 4px 2px; }
  .bubble-time.user { text-align: right; }
  .file-bubble {
    border-radius: 10px; padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .file-bubble.agent { background: #fff; border-top-left-radius: 2px; }
  .file-bubble.user { background: #d9fdd3; border-top-right-radius: 2px; }
  .file-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 18px;
  }
  .file-icon.img-thumb {
    width: 60px; height: 60px; border-radius: 8px; overflow: hidden;
  }
  .file-icon.img-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .file-details { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 500; color: #111b21; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 11px; color: #8696a0; }
  .typing-bubble {
    background: #fff; border-radius: 8px; border-top-left-radius: 2px;
    padding: 10px 14px; display: flex; gap: 4px; align-items: center; align-self: flex-start;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #8696a0; animation: tdot 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes tdot {
    0%,80%,100% { transform: scale(0.7); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
  .wa-input-area { background: #1f2c34; padding: 8px; flex-shrink: 0; }
  .wa-input-row { display: flex; align-items: flex-end; gap: 8px; }
  .wa-attach-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: transparent; border: none; color: #8696a0;
    font-size: 22px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .wa-attach-btn:hover { color: #e9edef; }
  .wa-text-input {
    flex: 1; background: #2a3942; border: none; border-radius: 24px;
    color: #e9edef; font-size: 14.5px; padding: 9px 16px;
    outline: none; resize: none; max-height: 100px;
    line-height: 1.4; font-family: inherit;
  }
  .wa-text-input::placeholder { color: #8696a0; }
  .wa-send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: #00a884; border: none; color: #fff;
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .wa-send-btn:hover { background: #06cf9c; }
  .wa-send-btn:disabled { background: #3d5a6a; cursor: not-allowed; }
  .file-preview-bar {
    background: #233138; border-radius: 8px;
    padding: 8px 12px; margin-bottom: 8px;
    display: none; align-items: center; gap: 10px;
  }
  .file-preview-bar.visible { display: flex; }
  .file-preview-name { color: #e9edef; font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-preview-remove { color: #8696a0; cursor: pointer; font-size: 18px; flex-shrink: 0; }
  .config-panel {
    width: 390px; max-width: 100%;
    background: #1a2730; border-radius: 16px;
    padding: 16px 20px; margin-bottom: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .config-title { color: #e9edef; font-size: 13px; font-weight: 500; }
  .config-input-row { display: flex; gap: 8px; align-items: center; }
  .config-input {
    flex: 1; background: #2a3942; border: 1px solid #3d5a6a;
    border-radius: 8px; color: #e9edef; font-size: 13px;
    padding: 8px 12px; outline: none; font-family: monospace;
  }
  .config-input:focus { border-color: #00a884; }
  .config-save {
    background: #00a884; border: none; border-radius: 8px;
    color: #fff; font-size: 13px; padding: 8px 14px; cursor: pointer;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #8696a0; display: inline-block; margin-right: 6px; }
  .status-dot.connected { background: #00a884; }
  .session-id-label { color: #8696a0; font-size: 11px; font-family: monospace; }
  .cors-note { color: #aebac1; font-size: 11px; line-height: 1.5; }
  .cors-note a { color: #00a884; }
</style>
</head>
<body>

<div class="config-panel">
  <div class="config-title">
    <span class="status-dot connected" id="status-dot"></span>
    Webhook N8N (fijo)
  </div>
  <div class="session-id-label" id="session-label">Session: generando...</div>
</div>

<div class="phone-frame">
  <div class="wa-header">
    <span class="wa-back">&#8592;</span>
    <div class="wa-avatar">&#128561;</div>
    <div class="wa-contact-info">
      <div class="wa-contact-name">CrediOpciones</div>
      <div class="wa-contact-status" id="agent-status">en línea</div>
    </div>
    <div class="wa-header-icons">
      <span class="wa-icon">&#128222;</span>
      <span class="wa-icon">&#8942;</span>
    </div>
  </div>

  <div class="wa-messages" id="messages">
    <div class="date-divider"><span>Hoy</span></div>
  </div>

  <div class="wa-input-area">
    <div class="file-preview-bar" id="file-preview-bar">
      <span id="file-preview-icon" style="font-size:20px;">&#128206;</span>
      <span class="file-preview-name" id="file-preview-name"></span>
      <span class="file-preview-remove" onclick="clearFile()">&#10005;</span>
    </div>
    <div class="wa-input-row">
      <button class="wa-attach-btn" onclick="document.getElementById('file-input').click()">&#128206;</button>
      <input type="file" id="file-input" accept="image/*,.pdf" style="display:none" onchange="handleFileSelect(event)"/>
      <textarea class="wa-text-input" id="msg-input" placeholder="Escribe un mensaje" rows="1"
        onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button class="wa-send-btn" id="send-btn" onclick="sendMessage()">&#10148;</button>
    </div>
  </div>
</div>

<script>
  const SESSION_ID = 'demo-' + Math.random().toString(36).substring(2, 10);
  const webhookUrl = 'https://ian8n.admosa.com/webhook/crediopciones-webhook';
  let useProxy = false;
  let pendingFile = null;
  let sending = false;

  document.getElementById('session-label').textContent = 'Session: ' + SESSION_ID;

  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function now() {
    return new Date().toLocaleTimeString('es-GT', { hour:'2-digit', minute:'2-digit', hour12:true });
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    setTimeout(() => m.scrollTop = m.scrollHeight, 50);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addBubble(text, who, fileInfo) {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ' + who;

    if (fileInfo) {
      const fb = document.createElement('div');
      fb.className = 'file-bubble ' + who;
      if (fileInfo.isImage && fileInfo.dataUrl) {
        const thumb = document.createElement('div');
        thumb.className = 'file-icon img-thumb';
        const img = document.createElement('img');
        img.src = fileInfo.dataUrl;
        thumb.appendChild(img);
        fb.appendChild(thumb);
      } else {
        const icon = document.createElement('div');
        icon.className = 'file-icon';
        icon.style.background = '#e8f5e9';
        icon.innerHTML = fileInfo.isPdf ? '&#128196;' : '&#128444;';
        fb.appendChild(icon);
      }
      const details = document.createElement('div');
      details.className = 'file-details';
      details.innerHTML = '<div class="file-name">' + escHtml(fileInfo.name) + '</div><div class="file-size">' + fileInfo.size + '</div>';
      fb.appendChild(details);
      wrap.appendChild(fb);
    } else {
      const b = document.createElement('div');
      b.className = 'bubble ' + who;
      b.innerHTML = escHtml(text).replace(/\n/g, '<br/>');
      wrap.appendChild(b);
    }

    const t = document.createElement('div');
    t.className = 'bubble-time ' + who;
    t.textContent = now() + (who === 'user' ? ' ✓✓' : '');
    wrap.appendChild(t);
    document.getElementById('messages').appendChild(wrap);
    scrollBottom();
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing-bubble';
    el.id = 'typing-indicator';
    el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    document.getElementById('messages').appendChild(el);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    pendingFile = file;
    document.getElementById('file-preview-name').textContent = file.name;
    document.getElementById('file-preview-icon').innerHTML = file.type.startsWith('image/') ? '&#128444;' : '&#128196;';
    document.getElementById('file-preview-bar').classList.add('visible');
    document.getElementById('msg-input').focus();
  }

  function clearFile() {
    pendingFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-preview-bar').classList.remove('visible');
  }

  async function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result.split(',')[1]);
      r.onerror = () => rej(new Error('Read failed'));
      r.readAsDataURL(file);
    });
  }

  async function sendMessage() {
    if (sending) return;
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text && !pendingFile) return;

    sending = true;
    document.getElementById('send-btn').disabled = true;

    const fileToSend = pendingFile;
    const textToSend = text;
    input.value = '';
    input.style.height = 'auto';

    if (fileToSend) {
      const isImage = fileToSend.type.startsWith('image/');
      let dataUrl = null;
      if (isImage) {
        dataUrl = await new Promise(res => {
          const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(fileToSend);
        });
      }
      addBubble('', 'user', { name: fileToSend.name, size: formatSize(fileToSend.size), isImage, isPdf: fileToSend.type==='application/pdf', dataUrl });
      clearFile();
    }
    if (textToSend) addBubble(textToSend, 'user');

    showTyping();
    document.getElementById('agent-status').textContent = 'escribiendo...';

    try {
      let body, headers = {};
      let targetUrl = webhookUrl;

      if (fileToSend) {
        const base64 = await toBase64(fileToSend);
        const payload = {
          sessionId: SESSION_ID,
          action: 'sendMessage',
          chatInput: textToSend || '[Documento adjunto: ' + fileToSend.name + ']',
          file: {
            name: fileToSend.name,
            type: fileToSend.type,
            size: fileToSend.size,
            data: base64
          }
        };
        body = JSON.stringify(payload);
        headers['Content-Type'] = 'application/json';
      } else {
        body = JSON.stringify({
          sessionId: SESSION_ID,
          action: 'sendMessage',
          chatInput: textToSend
        });
        headers['Content-Type'] = 'application/json';
      }

      if (useProxy) {
        targetUrl = 'https://corsproxy.io/?' + encodeURIComponent(webhookUrl);
      }

      const resp = await fetch(targetUrl, { method: 'POST', headers, body });

      removeTyping();

      if (!resp.ok) throw new Error('HTTP ' + resp.status + ' - Verifica que N8N esté escuchando');

      const contentType = resp.headers.get('content-type') || '';
      let reply = '';

      if (contentType.includes('application/json')) {
        const json = await resp.json();
        reply = json.output || json.text || json.message || json.response || json.chatInput || JSON.stringify(json);
      } else {
        reply = await resp.text();
      }

      if (reply) addBubble(reply, 'agent');
      document.getElementById('agent-status').textContent = 'en línea';

    } catch (err) {
      removeTyping();
      document.getElementById('cors-note').style.display = 'block';
      let msg = err.message;
      if (msg.includes('fetch')) msg = 'No se pudo conectar. ¿Está N8N escuchando? Si el error persiste, activa "Usar proxy CORS" arriba.';
      addBubble('⚠️ ' + msg, 'agent');
      document.getElementById('agent-status').textContent = 'en línea';
    }

    sending = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
</script>
</body>
</html>
